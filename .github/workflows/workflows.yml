name: ASG-Dual-Deployment-with-S3-Config

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 1. 설정 파일 및 정적 리소스 S3 업로드
      - name: Upload Config and Assets to S3
        run: |
          aws s3 cp ./default.conf s3://${{ secrets.S3_BUCKET_NAME }}/conf.d/default.conf
          aws s3 sync ./html/ s3://${{ secrets.S3_BUCKET_NAME }}/html/ --delete

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. FastAPI 이미지 빌드 및 푸시 (SHA 태그 사용)
      - name: Build and Push FastAPI to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_FASTAPI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./fastapi
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. Nginx 이미지 빌드 및 푸시 (SHA 태그 사용)
      - name: Build and Push Nginx to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NGINX }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. SSM을 통해 ASG 인스턴스들에 배포
      - name: Deploy to EC2 ASG using SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NGINX_REPO: ${{ secrets.ECR_REPOSITORY_NGINX }}
          FASTAPI_REPO: ${{ secrets.ECR_REPOSITORY_FASTAPI }}
          SHA: ${{ github.sha }}
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Namespace,Values=st7-asg" \
            --comment "Deploying Nginx and FastAPI with SHA: $SHA" \
            --parameters '{
                "commands": [
                  "sudo mkdir -p /home/ec2-user/nginx/html",
                  "sudo mkdir -p /home/ec2-user/nginx/conf.d",
                  "sudo chown -R ec2-user:ec2-user /home/ec2-user/nginx",
                  
                  "aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}/conf.d/default.conf /home/ec2-user/nginx/conf.d/default.conf",
                  "aws s3 sync s3://${{ secrets.S3_BUCKET_NAME }}/html/ /home/ec2-user/nginx/html/ --delete",
                  
                  "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin '"$REGISTRY"'",
                  
                  "sudo docker pull '"$REGISTRY"'/'"$FASTAPI_REPO"':'"$SHA"'",
                  "sudo docker pull '"$REGISTRY"'/'"$NGINX_REPO"':'"$SHA"'",
                  
                  "sudo docker stop nginx-container fastapi-container || true",
                  "sudo docker rm nginx-container fastapi-container || true",
                  
                  "sudo docker network create app-network || true",
                  
                  "sudo docker run -d --name fastapi-container --network app-network '"$REGISTRY"'/'"$FASTAPI_REPO"':'"$SHA"'",
                  
                  "sudo docker run -d --name nginx-container -p 80:80 --network app-network \
                    -v /home/ec2-user/nginx/html:/usr/share/nginx/html \
                    -v /home/ec2-user/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro \
                    '"$REGISTRY"'/'"$NGINX_REPO"':'"$SHA"'",
                  
                  "sudo docker image prune -a -f"
                ]
              }' \
            --region ${{ secrets.AWS_REGION }}